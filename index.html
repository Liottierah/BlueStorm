<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Press+Start+2P&display=swap');
        
        body {
            margin: 0; padding: 0; height: 100vh;
            background: radial-gradient(circle at 50% 30%, #2a0066 0%, #0a001f 60%, #000 100%);
            color: #80fff0;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stars {
            position: absolute; inset: 0;
            background: radial-gradient(circle, rgba(255,255,255,0.95) 1px, transparent 1px),
                        radial-gradient(circle, rgba(160,240,255,0.7) 1.5px, transparent 2px);
            background-size: 75px 75px, 160px 160px;
            animation: starsDrift 90s linear infinite;
            opacity: 0.55;
            z-index: 1;
        }

        @keyframes starsDrift {
            from { background-position: 0 0, 0 0; }
            to { background-position: 350px 300px, 250px 400px; }
        }

        .container {
            position: relative; z-index: 10;
            width: 86%; max-width: 660px;
            background: rgba(15, 10, 45, 0.65);
            border: 2px solid rgba(128, 255, 240, 0.6);
            border-radius: 24px;
            padding: 70px 45px;
            box-shadow: 0 0 90px rgba(128, 255, 240, 0.7),
                        0 0 180px rgba(200, 100, 255, 0.4),
                        inset 0 0 60px rgba(255,255,255,0.1);
            text-align: center;
        }

        h1 {
            font-size: 5.8em;
            font-weight: 900;
            letter-spacing: 26px;
            background: linear-gradient(90deg, #80fff0, #b8f8ff, #e0a0ff, #80fff0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 60px rgba(128, 255, 240, 0.9);
            margin: 0 0 10px 0;
            animation: glow 4s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { filter: brightness(1); }
            to { filter: brightness(1.45); }
        }

        .subtitle {
            color: #b0ffe8;
            font-size: 1.15em;
            margin-bottom: 6px;
        }

        .tagline {
            color: #88ddff;
            font-size: 0.96em;
            letter-spacing: 3px;
            margin-bottom: 60px;
        }

        button {
            padding: 26px 110px;
            font-size: 1.72em;
            background: transparent;
            color: #80fff0;
            border: 3px solid #80fff0;
            cursor: pointer;
            border-radius: 12px;
            box-shadow: 0 0 50px rgba(128, 255, 240, 0.7);
            transition: all 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-weight: 700;
        }

        button:hover {
            background: rgba(128, 255, 240, 0.1);
            transform: scale(1.06);
            box-shadow: 0 0 90px rgba(128, 255, 240, 1);
        }

        #abortBtn {
            margin-top: 18px;
            background: rgba(255, 60, 60, 0.2);
            border-color: #ff7777;
            color: #ffbbbb;
            display: none;
        }

        #log {
            margin-top: 55px;
            padding: 24px;
            background: rgba(5, 8, 35, 0.75);
            border: 1px solid rgba(128, 255, 240, 0.4);
            height: 320px;
            overflow-y: auto;
            text-align: left;
            font-family: 'Press Start 2P', system-ui;
            font-size: 0.9em;
            line-height: 1.75;
            display: none;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    
    <div class="container">
        <h1>BS</h1>
        <div class="subtitle">BLUESTORM</div>
        <div class="tagline">IN-SAFARI RESPRING TOOL</div>
        
        <button id="runBtn">LAUNCH STORM</button>
        <button id="abortBtn">ABORT STORM</button>
        
        <div id="log"></div>
    </div>

    <script>
        const logElement = document.getElementById('log');
        const runBtn = document.getElementById('runBtn');
        const abortBtn = document.getElementById('abortBtn');

        function addLog(text, color = '#80fff0') {
            const time = new Date().toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
            logElement.innerHTML += `<span style="color:#666">[${time}] </span><span style="color:${color}">${text}</span><br>`;
            logElement.scrollTop = logElement.scrollHeight;
        }

        async function loadAndRunStorm() {
            runBtn.disabled = true;
            logElement.style.display = 'block';
            logElement.innerHTML = '';

            addLog("Storm initialized...", "#ffff00");
            addLog("Loading engine...", "#a0f0ff");

            const script = document.createElement('script');
            script.src = "https://liottierah.github.io/BlueStorm/bluestorm.js";
            
            script.onload = () => {
                addLog("Engine loaded", "#00ff88");
                addLog("BlueStorm running...", "#ff0088");
                abortBtn.style.display = 'inline-block';
                if (typeof window.runBlurStorm === 'function') window.runBlurStorm();
            };

            script.onerror = () => {
                addLog("Load failed", "#ff4444");
                runBtn.disabled = false;
            };

            document.head.appendChild(script);
        }

        function abortStorm() {
            addLog("ABORT ACTIVATED...", "#ff6666");
            if (typeof window.stopBlurStorm === 'function') window.stopBlurStorm();
            runBtn.disabled = false;
            abortBtn.style.display = 'none';
        }

        window.onload = () => {
            runBtn.onclick = loadAndRunStorm;
            abortBtn.onclick = abortStorm;
        };
    </script>
</body>
</html>
