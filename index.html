<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BlueStorm</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Press+Start+2P&display=swap');
        
        body {
            margin: 0; padding: 0; height: 100vh;
            background: #0b001a; color: #80fff0;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden; position: relative;
            display: flex; align-items: center; justify-content: center;
        }

        .stars {
            position: absolute; inset: 0;
            background: radial-gradient(circle, rgba(255,255,255,0.95) 1px, transparent 1px),
                        radial-gradient(circle, rgba(120,220,255,0.65) 1.5px, transparent 2px);
            background-size: 70px 70px, 130px 130px;
            animation: starsDrift 75s linear infinite;
            opacity: 0.45; z-index: 1;
        }

        @keyframes starsDrift { from { background-position: 0 0; } to { background-position: 400px 400px; } }

        .container {
            position: relative; z-index: 10;
            width: 90%; max-width: 740px;
            background: rgba(10, 5, 40, 0.9);
            border: 3px solid #80fff0;
            box-shadow: 0 0 90px #80fff0, 0 0 170px #00ffff, 0 0 270px rgba(255,0,220,0.75),
                        inset 0 0 60px rgba(128,255,240,0.3);
            padding: 65px 45px; border-radius: 22px; text-align: center;
        }

        h1 {
            font-size: 4.3em; font-weight: 900; letter-spacing: 16px;
            background: linear-gradient(90deg, #80fff0, #00ffff, #ff00ff, #80fff0);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 50px #80fff0;
            animation: titlePulse 2s ease-in-out infinite alternate;
        }

        @keyframes titlePulse {
            from { filter: brightness(1) hue-rotate(0deg); }
            to { filter: brightness(1.4) hue-rotate(30deg); }
        }

        .subtitle {
            color: #ff88ee; font-size: 1.22em; margin-bottom: 55px;
            text-shadow: 0 0 20px #ff00dd; line-height: 1.45;
        }

        button {
            padding: 26px 110px; font-size: 1.8em;
            background: transparent; color: #80fff0;
            border: 5px solid #80fff0; cursor: pointer;
            box-shadow: 0 0 60px #80fff0, 0 0 130px rgba(255,0,220,0.7);
            transition: all 0.4s; text-transform: uppercase;
            letter-spacing: 6px; font-weight: 900;
        }

        button:hover {
            background: #80fff0; color: #0b001a;
            transform: scale(1.08); box-shadow: 0 0 110px #80fff0, 0 0 200px #ff00ff;
        }

        #abortBtn { background: rgba(255,30,30,0.2); border-color: #ff5555; color: #ffaaaa; display: none; }

        #log {
            margin-top: 50px; padding: 25px;
            background: rgba(0,5,25,0.95); border: 2px solid #80fff0;
            height: 360px; overflow-y: auto; text-align: left;
            font-family: 'Press Start 2P', system-ui; font-size: 0.93em;
            line-height: 1.75; display: none;
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    
    <div class="container">
        <h1>BLUESTORM</h1>
        <div class="subtitle">
            Ultimate Dynamic Blur Storm Respring Utility<br>
            9999+ real-time layers • Heavy Safari pressure
        </div>
        
        <button id="runBtn">LAUNCH STORM</button>
        <button id="abortBtn">ABORT STORM</button>
        
        <div id="log"></div>
    </div>

    <script>
        const logElement = document.getElementById('log');
        const runBtn = document.getElementById('runBtn');
        const abortBtn = document.getElementById('abortBtn');

        function addLog(text, color = '#80fff0') {
            const time = new Date().toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
            logElement.innerHTML += `<span style="color:#666">[${time}] </span><span style="color:${color}">${text}</span><br>`;
            logElement.scrollTop = logElement.scrollHeight;
        }

        async function loadAndRunStorm() {
            runBtn.disabled = true;
            logElement.style.display = 'block';
            logElement.innerHTML = '';

            addLog("Preparing Storm...", "#ffff00");
            await new Promise(r => setTimeout(r, 700));

            addLog("Downloading BlueStorm engine...", "#ffaa00");

            const script = document.createElement('script');
            script.src = "https://raw.githubusercontent.com/Liottierah/BlueStorm/refs/heads/main/bluestorm.js";
            
            script.onload = () => {
                addLog("Engine loaded successfully", "#00ff88");
                addLog("Running Storm...", "#ff0088");
                abortBtn.style.display = 'inline-block';
                
                if (typeof window.runBlurStorm === 'function') {
                    window.runBlurStorm();
                }
            };

            script.onerror = () => {
                addLog("Failed to load engine. Try from real Safari.", "#ff0000");
                runBtn.disabled = false;
            };

            document.head.appendChild(script);
        }

        function abortStorm() {
            addLog("ABORTING STORM...", "#ff4444");
            if (typeof window.stopBlurStorm === 'function') window.stopBlurStorm();
            runBtn.disabled = false;
            abortBtn.style.display = 'none';
        }

        window.onload = () => {
            runBtn.onclick = loadAndRunStorm;
            abortBtn.onclick = abortStorm;
        };
    </script>
</body>
</html>
